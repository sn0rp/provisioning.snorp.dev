#!ipxe

###############################################
# snorp homelab // provisioning.snorp.dev
###############################################

set base http://192.168.8.180

:menu
menu snorp homelab // provisioning.snorp.dev
item --gap --           --- Machine MAC Address: ${netX/mac} IP: ${netX/ip} ---
item --gap -- ========= Linux =========
item debian        Debian 13 (Trixie)
item ubuntu        Ubuntu 26.04 LTS
item arch          Arch Linux
item nixos         NixOS 25.11
item alpine        Alpine Linux 3.23
item kali          Kali Linux 2026.1
item --gap -- ========= FSF Approved =========
item trisquel      Trisquel 12 (KDE)
item guix          Guix System 1.5
item parabola      Parabola GNU/Linux-libre
item pureos        PureOS 11 (KDE)
item --gap -- ========= Utilities =========
item sysrescue     SystemRescueCD 13
item memtest       Memtest86+
item dban          DBAN
item --gap -- ========= Meme =========
item amogos        AmogOS 1.5
item nyarch        Nyarch Linux KDE
item templeos      TempleOS
item suicide       Suicide Linux (Debian + suffering)
item --gap --
item shell         iPXE shell
item localboot     Local Boot
choose --default localboot --timeout 60000 target && goto ${target}

###############################################
# Boot entries
###############################################

:debian
sanboot --no-describe --drive 0x00 ${base}/isos/debian/debian.iso || goto menu

:ubuntu
sanboot --no-describe --drive 0x00 ${base}/isos/ubuntu/ubuntu.iso || goto menu

:arch
sanboot --no-describe --drive 0x00 ${base}/isos/arch/arch.iso || goto menu

:nixos
sanboot --no-describe --drive 0x00 ${base}/isos/nixos/nixos.iso || goto menu

:alpine
sanboot --no-describe --drive 0x00 ${base}/isos/alpine/alpine.iso || goto menu

:kali
sanboot --no-describe --drive 0x00 ${base}/isos/kali/kali.iso || goto menu

:sysrescue
sanboot --no-describe --drive 0x00 ${base}/isos/sysrescue/sysrescue.iso || goto menu

:memtest
sanboot --no-describe --drive 0x00 ${base}/isos/memtest/memtest.iso || goto menu

:dban
sanboot --no-describe --drive 0x00 ${base}/isos/dban/dban.iso || goto menu

:trisquel
sanboot --no-describe --drive 0x00 ${base}/isos/trisquel/trisquel.iso || goto menu

:guix
sanboot --no-describe --drive 0x00 ${base}/isos/guix/guix.iso || goto menu

:parabola
sanboot --no-describe --drive 0x00 ${base}/isos/parabola/parabola.iso || goto menu

:pureos
sanboot --no-describe --drive 0x00 ${base}/isos/pureos/pureos.iso || goto menu

:amogos
sanboot --no-describe --drive 0x00 ${base}/isos/amogos/amogos.iso || goto menu

:nyarch
sanboot --no-describe --drive 0x00 ${base}/isos/nyarch/nyarch.iso || goto menu

:templeos
sanboot --no-describe --drive 0x00 ${base}/isos/templeos/templeos.iso || goto menu

###############################################
# Autoinstall entries
###############################################

:suicide
kernel ${base}/isos/debian/debian.iso
imgargs debian.iso auto=true priority=critical url=http://192.168.8.180:8080/config/suicide
boot || goto menu

:shell
shell
goto menu

:localboot
exit