#!ipxe

###############################################
# snorp homelab // provisioning.snorp.dev
###############################################

set base http://192.168.8.180

cpair --background 1 --foreground 15 0
cpair --background 1 --foreground 11 1
cpair --background 1 --foreground 14 2

:menu
menu snorp homelab // provisioning.snorp.dev
item --gap --           --- Machine MAC Address: ${netX/mac} IP: ${netX/ip} ---
item --gap -- ========= Linux =========
item debian        Debian 13 (Trixie)
item ubuntu        Ubuntu 26.04 LTS
item arch          Arch Linux
item nixos         NixOS 25.11
item alpine        Alpine Linux 3.23
item kali          Kali Linux 2026.1
item --gap -- ========= FSF Approved =========
item trisquel      Trisquel 12 (KDE)
item guix          Guix System 1.5
item parabola      Parabola GNU/Linux-libre
item pureos        PureOS 11 (KDE)
item --gap -- ========= Utilities =========
item sysrescue     SystemRescueCD 13
item memtest       Memtest86+
item dban          DBAN
item --gap -- ========= Meme =========
item amogos        AmogOS 1.5
item nyarch        Nyarch Linux KDE
item templeos      TempleOS
item suicide       Suicide Linux (Debian + suffering)
item --gap --
item shell         iPXE shell
item localboot     Local Boot
choose --default localboot --timeout 60000 target && goto ${target}

###############################################
# Boot entries
###############################################

:debian
chain --autofree ${base}/isos/debian/debian.iso || goto menu

:ubuntu
chain --autofree ${base}/isos/ubuntu/ubuntu.iso || goto menu

:arch
chain --autofree ${base}/isos/arch/arch.iso || goto menu

:nixos
chain --autofree ${base}/isos/nixos/nixos.iso || goto menu

:alpine
chain --autofree ${base}/isos/alpine/alpine.iso || goto menu

:kali
chain --autofree ${base}/isos/kali/kali.iso || goto menu

:sysrescue
chain --autofree ${base}/isos/sysrescue/sysrescue.iso || goto menu

:memtest
chain --autofree ${base}/isos/memtest/memtest.iso || goto menu

:dban
chain --autofree ${base}/isos/dban/dban.iso || goto menu

:trisquel
chain --autofree ${base}/isos/trisquel/trisquel.iso || goto menu

:guix
chain --autofree ${base}/isos/guix/guix.iso || goto menu

:parabola
chain --autofree ${base}/isos/parabola/parabola.iso || goto menu

:pureos
chain --autofree ${base}/isos/pureos/pureos.iso || goto menu

:amogos
chain --autofree ${base}/isos/amogos/amogos.iso || goto menu

:nyarch
chain --autofree ${base}/isos/nyarch/nyarch.iso || goto menu

:templeos
chain --autofree ${base}/isos/templeos/templeos.iso || goto menu

###############################################
# Autoinstall entries
###############################################

:suicide
kernel ${base}/isos/debian/debian.iso
imgargs debian.iso auto=true priority=critical url=http://192.168.8.180:8080/config/suicide
boot || goto menu

:shell
shell
goto menu

:localboot
exit