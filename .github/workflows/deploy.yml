name: Build and release provisioner

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          cd provisioner
          GOOS=linux GOARCH=amd64 go build -o ../provisioner-linux-amd64 .

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          files: provisioner-linux-amd64
          prerelease: false